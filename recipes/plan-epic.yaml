title: Plan an Epic
description: |
  Decompose a high-level brief into an epic issue plus child task
  issues conforming to the claude_and_ollama issue format.

  STUB — Claude Code currently authors issues directly. This recipe
  exists so we can experiment with delegating issue authoring to the
  runner in a later eval. Not wired up yet.

parameters:
  - key: brief
    input_type: string
    requirement: required
    description: One-paragraph description of the work
  - key: repo
    input_type: string
    requirement: required
    description: owner/repo to file issues against (e.g. why-pengo/health_track)

prompt: |
  TODO: this recipe is a placeholder.

  When we're ready to delegate issue authoring to the runner, this
  prompt should:
    1. Read prompts/issue-format.md in full.
    2. Decompose `{{ brief }}` into an epic + leaf issues.
    3. File them in {{ repo }} via the github__* tools with the
       correct labels (epic / runner-task) and dependency links.
    4. Print the list of created issue numbers.

  Until that's drafted, this recipe should not be run.
