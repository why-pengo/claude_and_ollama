title: Execute GitHub Issue
description: |
  Read a GitHub issue conforming to the claude_and_ollama issue format
  (see prompts/issue-format.md), execute its subtask checklist,
  comment with results, and open a PR if files were changed.

# Per-request Ollama options. CLI `--ollama-option KEY=VALUE` overrides these.
# `temperature: 0.2` ships as a recipe default per ADR-0008 — the runner's
# new default model (qwen2.5-coder:32b) is a prose-channel model and tightens
# materially at low temperature (see docs/bakeoff-summary.md Appendix A +
# evals/eval-35/rollup.md). Override at the call site with
# `--ollama-option temperature=<value>` when running a different model
# whose tool-call discipline regresses at low temperature.
options:
  temperature: 0.2

parameters:
  - key: issue_number
    input_type: string
    requirement: required
    description: GitHub issue number to execute (e.g. "1")
  - key: repo
    input_type: string
    requirement: required
    description: owner/repo to run against (e.g. why-pengo/health_track)
  - key: base_branch
    input_type: string
    requirement: optional
    default: main
    description: |
      Integration branch of the target repo. Branches are created
      from this; PRs target it. The runner auto-resolves it from the
      target's GitHub default_branch when --params repo=... is set,
      so this only matters as a fallback.
  - key: branch
    input_type: string
    requirement: optional
    description: |
      Working branch the runner uses for this session. The runner
      generates this as `runner/issue-<N>-<YYYYMMDD-HHMMSS>` when
      --params issue_number=... is set, so back-to-back same-task
      invocations don't collide (see #97, #98). Override only when
      reproducing a specific historical run.

# Step graph the runner uses to derive its next-step nudge when the model
# emits a prose-only turn. Walked in order: first step whose requires_prior
# steps are all done but who isn't done yet wins. "Done" = at least one of
# the step's advances_on tools returned a non-ERROR result this session.
# Nudge text is templated against the recipe's parameters at session start.
steps:
  - id: read_issue
    advances_on: [github__issue_read]
    nudge: |
      You have not read the issue yet. Step 1 of the recipe is mandatory:
      your NEXT TOOL CALL must be `github__issue_read` for issue
      #{{ issue_number }} in {{ repo }}. Do not narrate. Call the tool.

  - id: branch
    advances_on: [github__create_branch]
    requires_prior: [read_issue]
    nudge: |
      Issue read. Continue with Step 2 — create the branch. Your NEXT
      TOOL CALL must be `github__create_branch` with `branch={{ branch }}`
      from the integration branch. Use that name exactly.

  - id: write
    advances_on: [github__push_files, github__create_or_update_file]
    requires_prior: [branch]
    nudge: |
      The branch is created. Continue with Step 3 — execute the issue's
      subtask checklist. Your NEXT TOOL CALL must be `github__push_files`
      (multi-file) or `github__create_or_update_file` (single-file).
      Before overwriting an existing file, fetch its content first with
      `github__get_file_contents` to avoid clobbering unrelated content.

  - id: pr
    advances_on: [github__create_pull_request]
    requires_prior: [write]
    nudge: |
      You have committed files to the branch. Step 5 of the recipe is now
      mandatory: open the PR. Your NEXT TOOL CALL must be
      `github__create_pull_request`. Title: match the issue title.
      Body must include `Closes #{{ issue_number }}`, `## Summary`,
      `## Verification` (cite the gate's per-command results),
      `## Subtasks`. If the call is rejected because verification is
      failing, fix the failures and re-commit first. Do not narrate.
      Do not summarize. Call the tool.

  - id: comment
    advances_on: [github__add_issue_comment]
    requires_prior: [pr]
    nudge: |
      `github__create_pull_request` has fired. The recipe's Step 6 is now
      mandatory. Your NEXT TOOL CALL must be `github__add_issue_comment`
      on issue #{{ issue_number }} with the PR link and a status line
      (✅ done | ⚠️ partial | ❌ blocked). Do not narrate. Call the tool.

prompt: |
  You are executing GitHub issue #{{ issue_number }} in {{ repo }}.
  Operating rules are in your system context — already loaded.

  Tool names use the `github__` prefix (`github__issue_read`,
  `github__push_files`, etc.). Names below are shown unprefixed for
  readability; call them with the full prefixed names.

  **Your first tool call is Step 0.** Don't narrate. Call the tool.

  Integration branch: `{{ base_branch }}`. Branches you create come
  from it; the PR you open targets it.

  # Step 0 — Load target-repo guidance
  Try `github__get_file_contents` for `AGENTS.md` (root). If it exists,
  its body is additional system guidance — including pointers to any
  area-specific files (`backend/AGENTS.md`, `frontend/AGENTS.md`,
  etc.) you should read next based on what the issue actually
  touches. 404 = no AGENTS.md in this repo; skip and move on.

  On conflict: target repo wins for facts (paths, style, naming);
  the system prompt wins for safety rules.

  # Step 1 — Read the issue
  Fetch issue #{{ issue_number }} from {{ repo }} via
  `github__issue_read`. Read the full body and the files its Context
  section points at.

  If a required section is missing (Goal, Context, Subtasks,
  Acceptance criteria, Out of scope), STOP and comment asking for the
  missing pieces. Don't guess scope.

  # Step 2 — Branch
  Call `github__create_branch` with `branch={{ branch }}` from
  `{{ base_branch }}`. Use that name exactly — the runner generated
  it so back-to-back same-task invocations don't collide. Do not
  invent a slug.

  # Step 3 — Execute subtasks in order

  **`github__push_files` and `github__create_or_update_file` are the
  only tools that commit to the branch.** Nothing else lands code on
  the target repo.

  **Prefer `github__push_files` for changes that need to land
  together.** Each tool call is one commit, and the runner's
  verification gate runs after every commit — if a multi-file change
  lands in pieces (e.g. `test_x.py` before `x.py`), the gate may fail
  on intermediate states you didn't intend to verify. Use
  `github__create_or_update_file` only for genuinely standalone
  single-file changes.

  Before overwriting an existing file in the target repo, fetch its
  current content first with `github__get_file_contents` — don't
  rewrite from memory.

  For each checklist item:
    - Make the change via `github__push_files` or
      `github__create_or_update_file` with a conventional-commit
      message (`feat:`, `fix:`, `test:`, `docs:`, `refactor:`).
    - The runner's gate verifies each commit for you — watch for its
      feedback message and respond to it.

  Stop and comment if a subtask is ambiguous. If a subtask fails
  twice, stop and report — don't loop.

  # Step 4 — Respond to verification-gate feedback
  You cannot run commands. The runner runs the target repo's
  verification commands for you after every commit; when any fail,
  the failures arrive as a message in your next turn — fix them and
  re-commit. If the gate hasn't reported, the work isn't verified
  yet. Never claim a check passed that the gate didn't report.

  # Step 5 — Open the PR

  The moment your last file is pushed and the gate is green, call
  `github__create_pull_request`. The runner rejects this call while
  the last gate run had any failure — if rejected, fix the failures,
  re-commit, and only then retry. Title matches the issue title.
  Body, in order:

    - `Closes #{{ issue_number }}`
    - `## Summary` — what changed, 2–4 bullets
    - `## Verification` — cite the runner gate's results by command
      name, one line each, exactly this shape:

          ## Verification
          - `make check`: PASS (per runner gate)
          - `make test`: PASS (per runner gate)

      List the actual commands the gate reported (they come from the
      target's AGENTS.md). Do not write freeform verification prose
      and do not claim a check the gate didn't report.
    - `## Subtasks` — mirror of the issue checklist. Tick only items
      you actually executed
    - `## Follow-ups` (optional) — anything out of scope you noticed

  # Step 6 — Comment on the issue

  After `github__create_pull_request` returns, call
  `github__add_issue_comment` on #{{ issue_number }} with: status
  (✅ done | ⚠️ partial | ❌ blocked), link to the PR, anything
  surprising. Base the status on the gate: ✅ only if the last gate
  run was green.

  Steps 5 and 6 are not optional if any files were pushed.
