version: "1.0.0"
title: Execute GitHub Issue
description: |
  Read a GitHub issue conforming to the claude_and_goose issue format
  (see prompts/issue-format.md), execute its subtask checklist,
  comment with results, and open a PR if files were changed.

parameters:
  - key: issue_number
    input_type: string
    requirement: required
    description: GitHub issue number to execute (e.g. "1")
  - key: repo
    input_type: string
    requirement: optional
    default: why-pengo/claude_and_goose
    description: owner/repo to run against
  - key: base_branch
    input_type: string
    requirement: optional
    default: main
    description: |
      Integration branch of the target repo. Branches are created
      from this; PRs target this. The wrapper script auto-resolves
      it from the target's GitHub default_branch and passes it via
      --params. Defaults to `main` for self-runs against the harness
      where the wrapper isn't involved.

extensions:
  - type: builtin
    name: developer
    timeout: 600
  - type: stdio
    name: github
    cmd: github-mcp-server
    args:
      - stdio
    # No `envs:` block — Goose's extension envs map doesn't expand
    # ${VAR}, so values land literally. MCP stdio subprocess inherits
    # parent env; export GITHUB_PERSONAL_ACCESS_TOKEN before `goose run`.
    timeout: 300

prompt: |
  You are executing GitHub issue #{{ issue_number }} in {{ repo }}.
  The full operating rules are in `prompts/goose-system.md` — read
  that file first if you haven't already this session.

  The **integration branch** for this run is `{{ base_branch }}`.
  Every branch you create must be from `{{ base_branch }}`. Every
  PR you open must target `{{ base_branch }}`. Don't assume `main`
  — many repos use `develop` (Jon's standard workflow does).

  # Step 0 — Load target-repo guidance
  Try `get_file_contents` for each of these paths (404 = skip silently;
  do not stop after the first miss, attempt all four):

    1. `AGENTS.md`
    2. `backend/AGENTS.md`
    3. `frontend/AGENTS.md`
    4. `docs/AGENTS.md`

  Any content fetched is additional system guidance, layered on top
  of `goose-system.md`. On conflict: target repo wins for facts
  (paths, style, naming); `goose-system.md` wins for safety rules
  (no clone, no force-push, no secrets to disk, no `--no-verify`).

  # Step 1 — Read the issue
  Use the github extension to fetch issue #{{ issue_number }} from
  {{ repo }}. Read the full body. Then read every file path and
  follow every link listed in its Context section.

  If the issue is missing any required section (Goal, Context,
  Subtasks, Acceptance criteria, Out of scope), STOP and post a
  comment asking for the missing pieces. Do not guess scope.

  # Step 2 — Branch
  Create branch `goose/issue-{{ issue_number }}-<slug>` from the
  latest `{{ base_branch }}`. The slug is 3–5 kebab-case words
  drawn from the issue title.

  # Step 3 — Execute subtasks in order

  **Land every change via the github extension.** Only `push_files`
  (multi-file commit) and `create_or_update_file` (single-file commit)
  actually update the branch on GitHub. The developer extension's
  `write` and `edit` modify the container's filesystem only — they do
  not push to the branch. If you use them for code that needs to land
  on the branch, your branch stays empty and Steps 5–6 have nothing
  to fire on. `developer.shell`/`write`/`edit` are fine for *local*
  operations (running tests, inspecting downloaded content, scratch
  files under `/tmp`) — just not for the code changes themselves.

  Before overwriting an existing file in the target repo, read its
  current content first with `get_file_contents`. Don't fabricate a
  "probably correct" version from memory — the real file may have
  unrelated content (other functions, imports, etc.) that you'd
  clobber.

  For each checklist item:
    - Make the single concrete change it describes (via `push_files`
      or `create_or_update_file`).
    - Verify it (run the test, build, or command listed).
    - Each `push_files` / `create_or_update_file` call carries its
      own commit message — use a conventional-commit prefix
      (`feat:`, `fix:`, `test:`, `docs:`, `refactor:`).
  Stop and comment on the issue if a subtask is ambiguous. Do not
  invent scope. If a subtask fails twice, stop and report — do not
  loop.

  # Step 4 — Verify acceptance criteria
  Run every observable check listed under Acceptance criteria. If any
  fail, fix and re-verify before opening the PR.

  # Step 5 — Open the PR

  The moment your last file is pushed in Step 3, call `create_pull_request`.
  Don't ask, don't defer, don't decide whether — just do it. This is how
  the issue closes. Skipping it means a human has to come behind you and
  clean up an orphan branch.

  Title: match the issue title.
  Body must include, in this order:
    - `Closes #{{ issue_number }}`
    - `## Summary` — what changed, 2–4 bullets
    - `## Verification` — each acceptance criterion and how you
      confirmed it
    - `## Subtasks` — mirror of the issue checklist. Tick only items
      you actually executed; leave others unchecked with a one-line
      note. Don't tick a box for "verified by reading the file" —
      reading isn't running.
    - `## Follow-ups` (optional) — anything out of scope you noticed

  # Step 6 — Comment on the issue

  Immediately after `create_pull_request` returns, call
  `add_issue_comment` on #{{ issue_number }} with:
    - Status: ✅ done | ⚠️ partial | ❌ blocked
    - Link to the PR (or to the branch if nothing changed)
    - Anything surprising

  Steps 5 and 6 are **not optional** if you pushed any files. The run
  isn't done until both have fired.

  # Rules
  - Never close the issue directly — `Closes` on the PR does that on merge.
  - Never force-push. Never skip hooks (no `--no-verify`).
  - Never edit `{{ base_branch }}` directly.
  - One issue, one PR. Out-of-scope work goes under Follow-ups, not
    into this PR.
