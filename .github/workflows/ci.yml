# CI — runs the same pipeline as local `make ci` (format-check + lint +
# typecheck + tests) on every PR and on pushes to main. The `ci` job is a
# required status check in the main ruleset, so a red run blocks merge.
#
# Actions are pinned by commit SHA (tag in the comment) — tags are mutable
# and this workflow runs with repo read access on every PR. Until #124
# lands Dependabot config, bump the pins manually.

name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install dependencies
        run: make install-dev
      - name: Run checks and tests
        run: make ci
      # Separate step (not folded into make ci) because it queries the PyPI
      # advisory DB — local `make ci` stays runnable offline.
      - name: Audit dependencies for known CVEs
        run: make audit
