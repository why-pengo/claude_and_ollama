[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
filterwarnings = [
    "ignore::DeprecationWarning",
]

[tool.black]
line-length = 100
target-version = ["py312"]
extend-exclude = '''
/(
    \.venv
  | runner/\.venv
  | build
  | dist
)/
'''

[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = ["runner/.venv", "build", "dist"]

[tool.ruff.lint]
# E/W = pycodestyle, F = pyflakes, I = import order — parity with the
# pre-ruff lint toolchain (#122 records the evaluation and mapping).
# Ruff's defaults are narrower (E4/E7/E9/F), so select explicitly.
# E2xx whitespace rules ruff leaves to formatters are enforced by
# `black --check` in `make format-check` (see #122's evaluation).
select = ["E", "W", "F", "I"]
# E203/E501 mirror the previous linter's extend-ignore (black
# compatibility). W503 from that list has no ruff equivalent — it's in
# ruff's never-implement set, and listing it here is a config error.
ignore = ["E203", "E501"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]

[tool.ruff.lint.isort]
# Treat runner modules as first-party so the blank line between third-party
# (httpx, yaml, pytest) and our own imports (gh, salvage, run_recipe) holds.
known-first-party = [
    "gh",
    "ollama_client",
    "prose_rescue",
    "recipe",
    "run_recipe",
    "salvage",
    "session",
    "tools",
    "workspace",
]

[tool.mypy]
python_version = "3.12"
files = ["runner", "tests"]
exclude = [
    '^runner/\.venv/',
    '^htmlcov/',
    '^build/',
    '^dist/',
]
disallow_untyped_defs = true
warn_unused_ignores = true

[[tool.mypy.overrides]]
# Tests use monkeypatching with deliberately mis-shaped fake fns and don't
# carry domain-meaningful types — `disallow_untyped_defs` on test bodies is
# high-cost, low-value. The runner code still enforces full annotations.
module = [
    "conftest",
    "test_gh",
    "test_ollama_client",
    "test_prose_rescue",
    "test_recipe",
    "test_run_recipe",
    "test_salvage",
    "test_session",
    "test_tools",
    "test_workspace",
]
disallow_untyped_defs = false

[tool.coverage.run]
source = ["runner"]
omit = [
    "runner/.venv/*",
    "tests/*",
]

[tool.coverage.report]
show_missing = true
skip_empty = true

[tool.coverage.html]
directory = "htmlcov"
