[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
filterwarnings = [
    "ignore::DeprecationWarning",
]

[tool.black]
line-length = 100
target-version = ["py312"]
extend-exclude = '''
/(
    \.venv
  | runner/\.venv
  | build
  | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 100
skip = [".venv", "runner/.venv", "build", "dist"]
# Treat runner modules as first-party so isort keeps the blank line between
# third-party (httpx, yaml, pytest) and our own imports (gh, salvage, run_recipe).
known_first_party = ["gh", "salvage", "run_recipe", "workspace"]

[tool.coverage.run]
source = ["runner"]
omit = [
    "runner/.venv/*",
    "tests/*",
]

[tool.coverage.report]
show_missing = true
skip_empty = true

[tool.coverage.html]
directory = "htmlcov"
