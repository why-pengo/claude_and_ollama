[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
filterwarnings = [
    "ignore::DeprecationWarning",
]

[tool.black]
line-length = 100
target-version = ["py312"]
extend-exclude = '''
/(
    \.venv
  | runner/\.venv
  | build
  | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 100
skip = [".venv", "runner/.venv", "build", "dist"]
# Treat runner modules as first-party so isort keeps the blank line between
# third-party (httpx, yaml, pytest) and our own imports (gh, salvage, run_recipe).
known_first_party = ["gh", "ollama_client", "run_recipe", "salvage", "tools", "workspace"]

[tool.mypy]
python_version = "3.12"
files = ["runner", "tests"]
exclude = [
    '^runner/\.venv/',
    '^htmlcov/',
    '^build/',
    '^dist/',
]
disallow_untyped_defs = true
warn_unused_ignores = true

[[tool.mypy.overrides]]
# Tests use monkeypatching with deliberately mis-shaped fake fns and don't
# carry domain-meaningful types — `disallow_untyped_defs` on test bodies is
# high-cost, low-value. The runner code still enforces full annotations.
module = [
    "conftest",
    "test_gh",
    "test_ollama_client",
    "test_run_recipe",
    "test_salvage",
    "test_tools",
    "test_workspace",
]
disallow_untyped_defs = false

[tool.coverage.run]
source = ["runner"]
omit = [
    "runner/.venv/*",
    "tests/*",
]

[tool.coverage.report]
show_missing = true
skip_empty = true

[tool.coverage.html]
directory = "htmlcov"
