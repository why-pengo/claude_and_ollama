# Goose configuration for claude_and_goose
#
# Load this in addition to the user's standard config by exporting:
#   export GOOSE_ADDITIONAL_CONFIG_FILES="$(pwd)/goose.yaml"
# Or copy/symlink it to ~/.config/goose/config.yaml if this is the
# only Goose project you run.
#
# Verify with:  goose info -v   (should show GOOSE_PROVIDER, model,
# and the github extension)
#
# Required env at runtime:
#   GITHUB_PERSONAL_ACCESS_TOKEN — for the github MCP extension

GOOSE_PROVIDER: ollama
GOOSE_MODEL: qwen3.6:latest
OLLAMA_HOST: http://bazzite.local:11434

# Bump these if Goose cuts off on long reasoning steps. qwen3.6 has a
# generous context window and the 5090 has VRAM to spare.
GOOSE_CONTEXT_LIMIT: 65536
GOOSE_MAX_TURNS: 100

# Per-chunk timeout (seconds) for streamed Ollama responses. Bumped from
# default because some agent-tuned models (notably devstral) don't emit
# progressive content — they produce only the final tool_call delta
# after inference completes. Combined with cold model load (~6s for
# 14 GB), the wait between request and first delta can exceed Goose's
# default stream timeout and look like a "no tool call" failure. See
# #16 for the diagnosis.
OLLAMA_STREAM_TIMEOUT: 60

extensions:
  developer:
    type: builtin
    name: developer
    enabled: true
    timeout: 600

  # Official GitHub MCP server — Go binary from github/github-mcp-server.
  # Install once with: brew install github-mcp-server
  # NOTE: no `envs:` block. Goose treats values in that map literally
  # (no shell `${VAR}` expansion). The MCP stdio subprocess inherits
  # the parent process env, so exporting GITHUB_PERSONAL_ACCESS_TOKEN
  # before invoking `goose run` is sufficient — and verified during
  # eval-01 wrap-up.
  github:
    type: stdio
    name: github
    cmd: github-mcp-server
    args:
      - stdio
    enabled: true
    timeout: 300
