# Goose configuration for claude_and_goose
#
# Load this in addition to the user's standard config by exporting:
#   export GOOSE_ADDITIONAL_CONFIG_FILES="$(pwd)/goose.yaml"
# Or copy/symlink it to ~/.config/goose/config.yaml if this is the
# only Goose project you run.
#
# Verify with:  goose info -v   (should show GOOSE_PROVIDER, model,
# and the github extension)
#
# Required env at runtime:
#   GITHUB_PERSONAL_ACCESS_TOKEN — for the github MCP extension

GOOSE_PROVIDER: ollama
GOOSE_MODEL: qwen3.6:latest
OLLAMA_HOST: http://bazzite.local:11434

# qwen3.6 (= qwen35moe per Ollama model_info) supports 262144 native
# context length. We started conservative at 65536, but eval-10/11
# under #45 surfaced multi-file backend tasks hitting saturation
# (model losing rules, conflating tasks, stopping mid-run). The 5090
# has ~6GB VRAM headroom at the old setting, so we doubled to 131072
# (#47 experiment A). If this clears multi-file backend reliability,
# the model was on a starvation diet — not incapable.
GOOSE_CONTEXT_LIMIT: 131072
GOOSE_MAX_TURNS: 100

# Per-chunk timeout (seconds) for streamed Ollama responses. Generous
# default — protects against slow-first-chunk scenarios on cold model
# loads + long prompts (a real failure class for models that don't emit
# progressive content). No-op on fast models like qwen3.6 which stream
# continuously. Originally added in #23 on a hypothesis that this fixed
# devstral; eval-05 (PR #25) disproved that, but the setting is still
# reasonable defensive coding.
OLLAMA_STREAM_TIMEOUT: 60

extensions:
  developer:
    type: builtin
    name: developer
    enabled: true
    timeout: 600

  # Official GitHub MCP server — Go binary from github/github-mcp-server.
  # Install once with: brew install github-mcp-server
  # NOTE: no `envs:` block. Goose treats values in that map literally
  # (no shell `${VAR}` expansion). The MCP stdio subprocess inherits
  # the parent process env, so exporting GITHUB_PERSONAL_ACCESS_TOKEN
  # before invoking `goose run` is sufficient — and verified during
  # eval-01 wrap-up.
  github:
    type: stdio
    name: github
    cmd: github-mcp-server
    args:
      - stdio
    enabled: true
    timeout: 300
